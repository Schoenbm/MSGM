    buffer_m: 300            # bordure : recupere le reseau de bord de zone

  population:
    selector:
      type: iris
      codes: ["381850208","381850209","381850210"]   #  IRIS population a definir (ex Ile Verte)

# -- Reseau routier (OSM via osmnx) -----------------------------------------
network:
  types:
    - walk
    - drive                  # = voiture
  simplify: true

# -- Batiments --------------------------------------------------------------
buildings:
  source: bdtopo             # batim_grenoble (BD TOPO) + enrichissement OSM flats/levels

# -- Sortie -----------------------------------------------------------------
output:
  dir: "./data/processed/env"
  format: gpkg
