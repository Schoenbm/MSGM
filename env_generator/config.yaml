# ---------------------------------------------------------------------------
# env_generator - configuration de generation d'environnement (MSGM)
#
# Genere pour le jumeau numerique : reseau routier (pieton + voiture),
# batiments, population synthetique localisee (age + CSP).
#
# CRS unique : Lambert-93 (EPSG:2154). Non modifiable (DT + standard France).
# Lancement : python -m src.main --step env
# ---------------------------------------------------------------------------

crs: "EPSG:2154"

# -- Sources de donnees locales (chemins relatifs a ce fichier) -------------
sources:
  contours_iris: "./data/contour_iris.shp"        # 161 IRIS etude (Grenoble metro)
  buildings:     "./data/batim_grenoble.shp"      # BD TOPO bati (avec HAUTEUR)
  insee_filosofi: "./data/insee_metro_grenoble.shp"

# -- Sources distantes (telechargees si pas de fichier local) ---------------
# NB : liees au millesime 2022. Les noms de colonnes INSEE (P22_/C22_) sont
# codes en dur dans iris.py -> changer d'annee demande aussi de toucher au code.
datasets:
  contours_iris_url: "https://data.geopf.fr/telechargement/download/CONTOURS-IRIS/CONTOURS-IRIS_3-0__SHP_LAMB93_FXX_2024-01-01/CONTOURS-IRIS_3-0__SHP_LAMB93_FXX_2024-01-01.7z"
  insee_pop_url: "https://www.insee.fr/fr/statistiques/fichier/8647014/base-ic-evol-struct-pop-2022_csv.zip"
  insee_logement_url: "https://www.insee.fr/fr/statistiques/fichier/8647012/base-ic-logement-2022_csv.zip"

# -- Zones ------------------------------------------------------------------
# region     : terrain d'etude complet = toute la metropole (161 IRIS). C'est
#              sur cette emprise que sont generes routes + batiments.
# population : sous-ensemble ou la population est simulee (1 IRIS). La carte
#              plus grande que la population est VOULU (feature, pas erreur).
