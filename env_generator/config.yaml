      type: iris
      codes: ["380450000", "380570000", "381260000", "381510101", "381510102", "381510103", "381510104", "381510201", "381510202", "381510203", "381510301", "381510302", "381510303", "381510304", "381510305", "381510306", "381510401", "381510402", "381580101", "381580102", "381580103", "381690101", "381690102", "381690103", "381690104", "381690105", "381690106", "381690107", "381690108", "381690109", "381690110", "381690111", "381690112", "381700000", "381790101", "381790102", "381850102", "381850103", "381850104", "381850105", "381850106", "381850107", "381850108", "381850109", "381850110", "381850111", "381850201", "381850202", "381850203", "381850204", "381850205", "381850206", "381850207", "381850208", "381850209", "381850210", "381850211", "381850212", "381850213", "381850214", "381850215", "381850216", "381850301", "381850302", "381850303", "381850304", "381850305", "381850306", "381850307", "381850308", "381850309", "381850310", "381850311", "381850401", "381850402", "381850403", "381850404", "381850405", "381850406", "381850407", "381850408", "381850409", "381850410", "381850411", "381850412", "381850413", "381850414", "381850501", "381850502", "381850503", "381850504", "381850505", "381850506", "381850507", "381850601", "381850602", "381850603", "381850604", "381850605", "381850606", "381850607", "381850608", "381850609", "381850610", "381850611", "381880000", "382290101", "382290102", "382290201", "382290202", "382290203", "382290301", "382290302", "382290401", "382290402", "382290403", "382290404", "383090000", "383170101", "383170102", "383170106", "383820101", "383820102", "383820103", "383820104", "383820105", "383820201", "383820202", "383820203", "384210101", "384210102", "384210103", "384210201", "384210202", "384210301", "384210302", "384210401", "384210402", "384210501", "384210502", "384210601", "384210602", "384210603", "384230101", "384230102", "384710000", "384740101", "384740102", "384740103", "384740104", "384850101", "384850102", "384850103