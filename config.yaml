  region:
    same_as: population
    buffer_m: 2000           # +2 km autour de la zone population

# ── Réseau routier (OSM via osmnx) ───────────────────────────────────────────
network:
  types:
    - walk
    - drive                  # = voiture
  simplify: true

# ── Bâtiments ────────────────────────────────────────────────────────────────
buildings:
  source: bdtopo             # batim_grenoble (BD TOPO) + enrichissement OSM flats/levels

# ── Sortie ───────────────────────────────────────────────────────────────────
output:
  dir: "./data/processed/env"
  format: gpkg
